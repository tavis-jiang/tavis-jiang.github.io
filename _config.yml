# Basic Site Settings
locale            : "en-US"
site_theme        : "default" 
title             : "Tavis Jiang (蒋勃琛)"
title_separator   : "-"
name              : &name "Tavis Jiang"
description       : &description "蒋勃琛的个人学术主页 - 上海交通大学"
url               : "https://tavis-jiang.github.io" 
baseurl           : "" 
repository        : "tavis-jiang/tavis-jiang.github.io"

# Site Author
author:
  avatar           : "profile.png" # 请确保你的根目录下有这张照片，或者修改文件名
  name             : "Tavis Jiang (蒋勃琛)"
  pronouns         : "He/Him"
  bio              : "SJTU Undergraduate | CS Enthusiast | Linux & Vim user"
  location         : "Shanghai, China"
  employer         : "Shanghai Jiao Tong University"
  uri              : "https://tavis-jiang.github.io"
  email            : "24jiangbc@sjtu.edu.cn" 

  # Repositories and software development
  github           : "tavis-jiang" # 这里一定要改成你自己的 GitHub ID
  
  # Social media (如果你有，可以填入)
  linkedin         : # 建议填入你的 LinkedIn 用户名
  zhihu            : # 建议填入你的知乎 ID

# Publication Category
publication_category:
  books:
    title: 'Books'
  manuscripts:
    title: 'Journal Articles'    
  conferences:
    title: 'Conference Papers'

# Site Settings
teaser            :  
breadcrumbs       : false 
words_per_minute  : 160
future            : true
read_more         : "disabled" 
talkmap_link      : false      

# SEO Related
google_site_verification :
bing_site_verification   :

# Analytics
analytics:
  provider                : "false" 

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - node_modules
  - Gemfile
  - Gemfile.lock
  - vendor
keep_files:
  - .git
encoding: "utf-8"

# Markdown Processing
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  enable_coderay: false

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji
